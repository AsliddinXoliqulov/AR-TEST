<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR test</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #tap {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: rgba(0, 0, 0, .75);
            color: #fff;
            font: 600 18px system-ui;
            z-index: 9999;
        }

        #tap button {
            border: 0;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div id="tap">
        <button id="startBtn">Kamerani boshlash</button>
        <a href="./video.html"></a>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="vid" src="video.mp4" loop muted autoplay playsinline webkit-playsinline preload="auto"
                crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="t0" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="0.6" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.getElementById("startBtn");
        const tap = document.getElementById("tap");
        const video = document.getElementById("vid");
        const target = document.getElementById("t0");

        // iPhone autoplay bloklamasligi uchun 1 marta user gesture
        startBtn.addEventListener("click", async () => {
            tap.style.display = "none";
            try {
                video.muted = true;
                await video.play();
            } catch (e) {
                console.log("Video play blocked:", e);
            }
        });

        target.addEventListener("targetFound", async () => {
            try { await video.play(); } catch (e) { console.log("play blocked", e); }
        });

        target.addEventListener("targetLost", () => {
            video.pause();
            video.currentTime = 0;
        });
    </script>
</body>

</html>
